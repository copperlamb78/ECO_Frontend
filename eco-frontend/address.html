<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecoleta — Pontos próximos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --green: #2d6a4f;
        --green-light: #52b788;
        --green-pale: #d8f3dc;
        --text: #1b1b1b;
        --muted: #6b7280;
        --bg: #f9fafb;
        --white: #ffffff;
        --border: #e5e7eb;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 1rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--white);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .logo {
        font-family: "DM Serif Display", serif;
        font-size: 1.3rem;
        color: var(--green);
      }

      .logo span {
        color: var(--green-light);
      }

      .back {
        font-size: 0.9rem;
        color: var(--muted);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }

      .back:hover {
        color: var(--green);
      }

      .layout {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      /* Sidebar */
      .sidebar {
        width: 340px;
        flex-shrink: 0;
        background: var(--white);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .sidebar-header {
        padding: 1.2rem 1.5rem;
        border-bottom: 1px solid var(--border);
      }

      .sidebar-header h2 {
        font-family: "DM Serif Display", serif;
        font-size: 1.2rem;
        margin-bottom: 0.2rem;
      }

      .sidebar-header p {
        font-size: 0.85rem;
        color: var(--muted);
      }

      .pontos-lista {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .ponto-card {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1rem;
        cursor: pointer;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      .ponto-card:hover,
      .ponto-card.ativo {
        border-color: var(--green-light);
        box-shadow: 0 0 0 3px var(--green-pale);
      }

      .ponto-card h3 {
        font-size: 0.95rem;
        font-weight: 500;
        margin-bottom: 0.3rem;
      }

      .ponto-card .endereco {
        font-size: 0.82rem;
        color: var(--muted);
        margin-bottom: 0.5rem;
        line-height: 1.4;
      }

      .ponto-card .distancia {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--green);
        background: var(--green-pale);
        padding: 0.2rem 0.6rem;
        border-radius: 999px;
      }

      .status {
        padding: 2rem 1.5rem;
        text-align: center;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.6;
      }

      /* Mapa */
      #map {
        flex: 1;
      }

      /* Loading */
      #loading {
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.92);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        z-index: 9999;
        font-size: 0.95rem;
        color: var(--muted);
      }

      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid var(--green-pale);
        border-top-color: var(--green);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 640px) {
        .layout {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
          height: 40vh;
          border-right: none;
          border-top: 1px solid var(--border);
          order: 2;
        }
        #map {
          order: 1;
          flex: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
      <span>Obtendo sua localização...</span>
    </div>

    <header>
      <div class="logo">eco<span>leta</span></div>
      <a href="index.html" class="back"> ← Voltar </a>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>Pontos próximos</h2>
          <p id="subtitulo">Buscando pontos de coleta...</p>
        </div>
        <div class="pontos-lista" id="lista"></div>
      </aside>
      <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Carrega as variáveis de ambiente -->
    <script src="env.js"></script>
    <script>
      const API_URL = window.env.API_URL;
      let map,
        userMarker,
        markers = [];

      // Inicializa o mapa
      map = L.map("map").setView([-15, -50], 5);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap",
      }).addTo(map);

      // Ícone personalizado
      const iconeVerde = L.divIcon({
        html: `<div style="width:14px;height:14px;background:#2d6a4f;border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>`,
        className: "",
        iconSize: [14, 14],
        iconAnchor: [7, 7],
      });

      const iconeUsuario = L.divIcon({
        html: `<div style="width:16px;height:16px;background:#3b82f6;border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>`,
        className: "",
        iconSize: [16, 16],
        iconAnchor: [8, 8],
      });

      function formatarDistancia(metros) {
        if (!metros) return "Distância não calculada";
        if (metros < 1000) return `${Math.round(metros)} m`;
        return `${(metros / 1000).toFixed(1)} km`;
      }

      function renderizarLista(pontos) {
        const lista = document.getElementById("lista");
        const subtitulo = document.getElementById("subtitulo");

        if (pontos.length === 0) {
          lista.innerHTML = `<div class="status">Nenhum ponto de coleta encontrado num raio de 5000 km.</div>`;
          subtitulo.textContent = "0 pontos encontrados";
          return;
        }

        subtitulo.textContent = `${pontos.length} ponto${pontos.length > 1 ? "s" : ""} encontrado${pontos.length > 1 ? "s" : ""}`;
        lista.innerHTML = "";

        pontos.forEach((ponto, i) => {
          const card = document.createElement("div");
          card.className = "ponto-card";
          card.innerHTML = `
          <h3>${ponto.nome}</h3>
          <div class="endereco">${ponto.endereco || ""} ${ponto.cidade ? "— " + ponto.cidade + "/" + ponto.estado : ""}</div>
          <span class="distancia">📍 ${formatarDistancia(ponto.distancia_metros)}</span>
        `;
          card.addEventListener("click", () => {
            document
              .querySelectorAll(".ponto-card")
              .forEach((c) => c.classList.remove("ativo"));
            card.classList.add("ativo");
            markers[i].openPopup();
            map.setView(markers[i].getLatLng(), 15);
          });
          lista.appendChild(card);
        });
      }

      function adicionarMarcadores(pontos, userLat, userLng) {
        markers.forEach((m) => map.removeLayer(m));
        markers = [];

        pontos.forEach((ponto) => {
          let lat, lng;
          try {
            lat = ponto.latitude;
            lng = ponto.longitude;
            if (!lat || !lng) return;
          } catch {
            return;
          }

          const marker = L.marker([lat, lng], { icon: iconeVerde })
            .addTo(map)
            .bindPopup(
              `<strong>${ponto.nome}</strong><br>${ponto.endereco || ""}<br>${ponto.cidade || ""}`,
            );
          markers.push(marker);
        });

        if (markers.length > 0) {
          const group = L.featureGroup([userMarker, ...markers]);
          map.fitBounds(group.getBounds().pad(0.2));
        }
      }

      async function buscarPontos(lat, lng) {
        try {
          const res = await fetch(
            `${API_URL}/pontos?latitude=${lat}&longitude=${lng}&distancia_metros=5000000`,
          );
          const data = await res.json();
          renderizarLista(data.pontos);
          adicionarMarcadores(data.pontos, lat, lng);
        } catch (err) {
          document.getElementById("lista").innerHTML =
            `<div class="status">Erro ao conectar com a API. Verifique se o backend está rodando.</div>`;
        }
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const { latitude, longitude } = pos.coords;

          userMarker = L.marker([latitude, longitude], { icon: iconeUsuario })
            .addTo(map)
            .bindPopup("Você está aqui")
            .openPopup();

          map.setView([latitude, longitude], 13);
          document.getElementById("loading").style.display = "none";
          buscarPontos(latitude, longitude);
        },
        () => {
          document.getElementById("loading").style.display = "none";
          document.getElementById("lista").innerHTML =
            `<div class="status">Não foi possível obter sua localização. Verifique as permissões do navegador.</div>`;
        },
      );
    </script>
  </body>
</html>
