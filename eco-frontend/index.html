<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecoleta — Descarte consciente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #19008b;
      --green-light: #6d57cc;
      --green-pale: #8876d6;
      --text: #1b1b1b;
      --muted: #6b7280;
      --bg: #f9fafb;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--green);
      letter-spacing: -0.5px;
    }

    .logo span {
      color: var(--green-light);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      background: var(--green-pale);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
    }

    .icon svg {
      width: 36px;
      height: 36px;
      color: var(--green);
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.15;
      color: var(--text);
      max-width: 560px;
      margin-bottom: 1rem;
    }

    h1 em {
      font-style: normal;
      color: var(--green);
    }

    p {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--green);
      color: #fff;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      padding: 0.85rem 2rem;
      border-radius: 999px;
      transition: background 0.2s, transform 0.15s;
    }

    .btn:hover {
      background: #1f4f39;
      transform: translateY(-1px);
    }

    .btn svg {
      width: 18px;
      height: 18px;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">eco<span>leta</span></div>
  </header>

  <main>
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V8l-5-5H9z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 3v5h6"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 12v5M9.5 14.5l2.5 2.5 2.5-2.5"/>
      </svg>
    </div>

    <h1>Descarte seu lixo eletrônico <em>do jeito certo</em></h1>
    <p>Encontre pontos de coleta de eletrônicos próximos a você de forma rápida e gratuita.</p>

    <a href="address.html" class="btn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      Encontrar pontos próximos
    </a>
  </main>

  <footer>
    Ecoleta &mdash; Descarte consciente
  </footer>

</body>
</html>
